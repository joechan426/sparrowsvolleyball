    let pdfLibraryPromise = null;
    const loadPdfLibraries = () => {
      if (pdfLibraryPromise) return pdfLibraryPromise;

      const loadScript = (src) => new Promise((resolve, reject) => {
        const existing = Array.from(document.querySelectorAll('script')).find(s => s.src === src);
        if (existing && existing.dataset.loaded === "true") return resolve();
        if (existing) {
          existing.addEventListener('load', () => resolve());
          existing.addEventListener('error', reject);
          return;
        }
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.dataset.loaded = "false";
        script.onload = () => {
          script.dataset.loaded = "true";
          resolve();
        };
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(script);
      });

      pdfLibraryPromise = (async () => {
        await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
        await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js");
      })();

      return pdfLibraryPromise;
    };

    async function printSchedulePdf() {
      await loadPdfLibraries();
      const { jsPDF } = window.jspdf;

      const team = document.getElementById("teamFilter").value;
      const division = document.getElementById("divisionFilter").value;
      const court = document.getElementById("courtFilter").value;
      const date = document.getElementById("dateFilter").value;

      const matrixMode = !team && !division && !court;

      const headerEl = document.querySelector('#appPage .header-text h1');
      const header = (headerEl && headerEl.textContent.trim()) || currentTournament || 'Schedule';
      const doc = new jsPDF({ orientation: matrixMode ? 'landscape' : 'portrait' });
      doc.setProperties({ title: header });

      const headers = ['Date', 'Time', 'Team A', 'Team B', 'Court', 'Duty', 'Division'];
      const allFiltersClear = !team && !division && !court && !date;
      const dateList = date
        ? [date]
        : Object.keys(scheduleData).sort((a, b) => new Date(a) - new Date(b));
      const descEl = document.querySelector('p.description');
      const desc = descEl ? descEl.innerText.replace(/\n+/g, ' ') : '';
      const descLines = doc.splitTextToSize(desc, doc.internal.pageSize.getWidth() - 28);
      const marginTop = 30 + descLines.length * 6;

      const renderTable = (body, rowColors) => {
        doc.autoTable({
          head: [headers],
          body,
          margin: { top: marginTop },
          styles: { fontSize: 10 },
          headStyles: { fillColor: [0, 100, 0] },
          rowPageBreak: 'avoid',
          didDrawPage: (data) => {
            doc.setFontSize(16);
            doc.text(header, data.settings.margin.left, 15);
            doc.setFontSize(10);
            doc.text(descLines, data.settings.margin.left, 22);
          },
          didParseCell: (data) => {
            if (data.section === 'body') {
              const colors = rowColors[data.row.index] || {};
              if (data.column.index === 2 && colors.team) {
                data.cell.styles.textColor = colors.team;
                if (team) data.cell.styles.fontStyle = 'bold';
              } else if (data.column.index === 3 && colors.opponent) {
                data.cell.styles.textColor = colors.opponent;
                if (team) data.cell.styles.fontStyle = 'bold';
              } else if (data.column.index === 5 && colors.duty) {
                data.cell.styles.textColor = colors.duty;
                if (team) data.cell.styles.fontStyle = 'bold';
              }
            }
          }
        });
      };

      const renderMatrixTable = (d) => {
        const matches = (scheduleData[d] || []);
        if (!matches.length) return;

        const times = Array.from(new Set(matches.map(m => m.time))).sort();
        const courts = Array.from(new Set(matches.map(m => m.location))).sort();

        // Body cells are limited to a height between 25px and 40px when
        // generating the landscape matrix table. The first row (court headers)
        // is allowed to shrink to the minimum height.
        const MAX_MATRIX_CELL_HEIGHT = 40;

        const body = times.map(t => {
          const row = [t];
          courts.forEach(c => {
            const cellMatches = matches.filter(m => m.time === t && m.location === c);
            row.push({ matches: cellMatches });
          });
          return row;
        });

        doc.autoTable({
          head: [["Time", ...courts]],
          body,
          margin: { top: marginTop },
          styles: { fontSize: 9, cellPadding: 1, lineWidth: 0.1, lineColor: [0, 0, 0] },
          headStyles: { fillColor: [0, 100, 0], minCellHeight: 0 },
          bodyStyles: { minCellHeight: 25, maxCellHeight: MAX_MATRIX_CELL_HEIGHT },
          tableLineWidth: 0.1,
          tableLineColor: [0, 0, 0],
          didParseCell: data => {
            if (data.section === 'body') {
              if (data.column.index === 0) {
                data.cell.styles.fontSize = 11;
                data.cell.styles.fontStyle = 'bold';
              } else if (data.column.index > 0) {
                // Cap cell height for matrix table
                data.cell.styles.minCellHeight = 25;
                data.cell.styles.maxCellHeight = MAX_MATRIX_CELL_HEIGHT;
                data.cell.text = '';
              }
            }
          },
          didDrawPage: data => {
            doc.setFontSize(16);
            doc.text(header, data.settings.margin.left, 15);
            doc.setFontSize(10);
            doc.text(descLines, data.settings.margin.left, 22);
            doc.setFontSize(12);
            doc.text(d, data.settings.margin.left, marginTop - 4);
          },
          didDrawCell: data => {
            if (data.section === 'body' && data.column.index > 0) {
              const ms = (data.cell.raw && data.cell.raw.matches) || [];
              let y = data.cell.y + 3.5;
              ms.forEach((m, idx) => {
                if (y > data.cell.y + MAX_MATRIX_CELL_HEIGHT) return;
                doc.setFontSize(9);
                doc.setTextColor(...hexToRgb(getTeamColor(m.team)));
                doc.text(`${m.team || ''} vs`, data.cell.x + 2, y);
                y += 3.5;
                if (y > data.cell.y + MAX_MATRIX_CELL_HEIGHT) return;
                doc.setTextColor(...hexToRgb(getTeamColor(m.opponent)));
                doc.text(m.opponent || '', data.cell.x + 2, y);
                y += 3.5;
                if (y > data.cell.y + MAX_MATRIX_CELL_HEIGHT) return;
                doc.setTextColor(150, 150, 150);
                const dutyText = `Duty: ${m.dutyTeam || ''}`;
                const dutyLines = doc.splitTextToSize(dutyText, data.cell.width - 4);
                dutyLines.forEach(line => {
                  if (y > data.cell.y + MAX_MATRIX_CELL_HEIGHT) return;
                  doc.text(line, data.cell.x + 2, y);
                  y += 3.5;
                });
                if (y > data.cell.y + MAX_MATRIX_CELL_HEIGHT) return;
                const padding = 2;
                const divText = m.division || '';
                const textW = doc.getTextWidth(divText);
                const rectW = textW + padding * 2;
                const rectH = 4;
                doc.setFillColor(224, 224, 224);
                doc.roundedRect(data.cell.x + 2, y, rectW, rectH, 2, 2, 'F');
                doc.setFontSize(7);
                doc.setTextColor(51, 51, 51);
                doc.text(divText, data.cell.x + 2 + padding, y + rectH - 1);
                y += rectH;
                if (idx < ms.length - 1) y += 3.5; // gap between matches
              });
              y += 3.5; // bottom padding
              doc.setTextColor(0,0,0);
            }
          }
        });
      };

      const processDate = (d) => {
        const body = [];
        const rowColors = [];
        (scheduleData[d] || []).forEach(match => {
          if (team) {
            const t = normalizeName(team);
            const dutyText = normalizeName(match.dutyTeam || '');
            if (t !== normalizeName(match.team) &&
                t !== normalizeName(match.opponent) &&
                !dutyText.includes(t)) return;
          }
          if (division && match.division !== division) return;
          if (court && match.location !== court) return;

          body.push([
            d,
            match.time || '',
            match.team || '',
            match.opponent || '',
            match.location || '',
            match.dutyTeam || '',
            match.division || ''
          ]);

          if (team) {
            const hl = [57, 255, 20];
            const dutyHighlight = normalizeName(match.dutyTeam || '').includes(normalizeName(team)) ? hl : null;
            rowColors.push({
              team: team === match.team ? hl : null,
              opponent: team === match.opponent ? hl : null,
              duty: dutyHighlight
            });
          } else {
            rowColors.push({
              team: hexToRgb(getTeamColor(match.team)),
              opponent: hexToRgb(getTeamColor(match.opponent)),
              duty: getDutyColor(match.dutyTeam)
            });
          }
        });
        return { body, rowColors };
      };

      if (matrixMode) {
        dateList.forEach((d, idx) => {
          if (idx > 0) doc.addPage();
          renderMatrixTable(d);
        });
      } else if (allFiltersClear) {
        dateList.forEach((d, idx) => {
          const { body, rowColors } = processDate(d);
          if (!body.length) return;
          if (idx > 0) doc.addPage();
          renderTable(body, rowColors);
        });
      } else {
        const body = [];
        const rowColors = [];
        dateList.forEach(d => {
          const result = processDate(d);
          body.push(...result.body);
          rowColors.push(...result.rowColors);
        });
        renderTable(body, rowColors);
      }

      const url = doc.output('bloburl');
      window.open(url, '_blank');
    }

    document.getElementById("teamFilter").addEventListener("change", () => {
      document.getElementById("divisionFilter").value = "";
      document.getElementById("courtFilter").value = "";
      filterResults();
    });
    document.getElementById("divisionFilter").addEventListener("change", () => {
      document.getElementById("teamFilter").value = "";
      document.getElementById("courtFilter").value = "";
      filterResults();
    });
    document.getElementById("courtFilter").addEventListener("change", () => {
      document.getElementById("teamFilter").value = "";
      document.getElementById("divisionFilter").value = "";
      filterResults();
    });
    document.getElementById("dateFilter").addEventListener("change", filterResults);
    document.getElementById("combineViewBtn").addEventListener("click", openCombineDivisionsPopup);
    window.addEventListener("DOMContentLoaded", async () => {
      bindBackButton();
      bindSpecialTournamentButtons();
      const urlParams = new URLSearchParams(window.location.search);
      const initialTournament = urlParams.get("tournament");

      if (initialTournament) {
        showLoading("Loading tournament...");
        try {
          await enterTournament(initialTournament, { showLoader: false });
        } finally {
          hideLoading();
        }
      } else {
        showTournamentPage();
        await loadTournamentList();
      }
    });
</script>

  </div>
</body>
</html>
