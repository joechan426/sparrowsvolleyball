
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparrowsVolleyball</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    :root {
      --sky: #b8f3ff;
      --sea: #31d1cb;
      --sand: #ffe7a8;
      --pine: #0b5b53;
      --cherry: #ff6b6b;
      --gold: #ffd166;
      --shell: #fff9ed;
      --sunset: #ff9f70;
      --lagoon: #12c4a0;
      --loading-sprite-size: 88px;
    }
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 227, 150, 0.42) 0, rgba(255, 227, 150, 0) 38%),
        radial-gradient(circle at 82% 12%, rgba(255, 166, 158, 0.38) 0, rgba(255, 166, 158, 0) 36%),
        radial-gradient(circle at 50% 96%, rgba(49, 209, 203, 0.22) 0, rgba(49, 209, 203, 0) 46%),
        linear-gradient(180deg, rgba(184, 243, 255, 0.95) 0%, rgba(104, 228, 210, 0.85) 45%, rgba(255, 231, 168, 0.94) 100%),
        repeating-linear-gradient(145deg, rgba(255, 255, 255, 0.1) 0, rgba(255, 255, 255, 0.1) 8px, rgba(0, 0, 0, 0) 8px, rgba(0, 0, 0, 0) 16px);
      background-attachment: fixed;
      margin: 0;
      padding: 24px;
      color: var(--pine);
      min-height: 100vh;
    }
    body.lunar-cup-theme {
      --sky: #ffe6d6;
      --sea: #f04f4f;
      --sand: #ffe3a1;
      --pine: #6b1f1f;
      --cherry: #d72638;
      --gold: #ffcc4d;
      --shell: #fff4e8;
      --sunset: #f1783d;
      --lagoon: #c72c2c;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 200, 140, 0.5) 0, rgba(255, 200, 140, 0) 40%),
        radial-gradient(circle at 80% 18%, rgba(255, 120, 120, 0.42) 0, rgba(255, 120, 120, 0) 38%),
        radial-gradient(circle at 50% 92%, rgba(255, 210, 120, 0.32) 0, rgba(255, 210, 120, 0) 48%),
        linear-gradient(180deg, rgba(255, 233, 214, 0.98) 0%, rgba(255, 160, 140, 0.9) 52%, rgba(255, 227, 168, 0.94) 100%),
        repeating-linear-gradient(145deg, rgba(255, 255, 255, 0.12) 0, rgba(255, 255, 255, 0.12) 8px, rgba(0, 0, 0, 0) 8px, rgba(0, 0, 0, 0) 16px);
    }
    h1 {
      font-size: 30px;
      margin-bottom: 6px;
      color: var(--cherry);
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 3px 16px rgba(255, 159, 112, 0.6), 0 0 24px rgba(18, 196, 160, 0.45);
    }
    p.description {
      margin-top: 0;
      color: #0c7c6f;
      font-size: 15px;
      line-height: 1.6;
    }
    .site-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 60px;
      height: 60px;
      object-fit: contain;
      filter: drop-shadow(0 6px 10px rgba(18, 196, 160, 0.28));
    }
    .tournament-logo-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tournament-logo-row {
      display: flex;
      justify-content: flex-start;
      align-items: flex-end;
      gap: 12px;
    }
    .tournament-logo-link {
      display: inline-flex;
    }
    .tournament-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 6px 10px rgba(18, 196, 160, 0.28));
    }
    .tournament-logo-text {
      color: var(--pine);
      font-weight: 700;
      font-size: 15px;
      line-height: 1.35;
      text-align: left;
      margin-left: 4px;
      padding-bottom: 6px;
      align-self: flex-start;
      white-space: normal;
      word-break: break-word;
      max-width: 100%;
    }
    .header-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .filters {
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255, 249, 237, 0.9), rgba(184, 243, 255, 0.88));
      box-shadow: 0 12px 26px rgba(12, 83, 40, 0.2), 0 6px 14px rgba(255, 159, 112, 0.25);
      border: 1px solid rgba(255, 209, 102, 0.8);
    }
    select {
      background: rgba(255, 255, 255, 0.9);
      color: var(--pine);
      box-shadow: inset 0 1px 3px rgba(18, 196, 160, 0.22);
    }
    select, button {
      padding: 10px 14px;
      font-size: 16px;
      border-radius: 999px;
      border: none;
    }
    button {
      background: linear-gradient(120deg, var(--sunset), var(--lagoon));
      color: #fffaf2;
      font-weight: 700;
      box-shadow: 0 6px 16px rgba(18, 196, 160, 0.3);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(255, 159, 112, 0.38);
      filter: saturate(1.08);
      background: linear-gradient(120deg, #ff7f6a, #18c29c);
    }
    button:focus,
    button:active,
    button.active {
      outline: 2px solid rgba(255, 209, 102, 0.95);
      box-shadow: 0 0 10px rgba(255, 209, 102, 0.8);
    }
    .card {
      border: 1px solid transparent;
      padding: 18px;
      margin-bottom: 18px;
      border-radius: 16px;
      background: linear-gradient(160deg, rgba(255, 249, 237, 0.95), rgba(184, 243, 255, 0.7));
      border-image: linear-gradient(45deg, rgba(255, 159, 112, 0.9), rgba(18, 196, 160, 0.85)) 1;
      box-shadow: 0 12px 25px rgba(12, 83, 40, 0.2), 0 6px 16px rgba(255, 159, 112, 0.18);
    }
    .team {
      font-size: 22px;
      font-weight: 700;
      color: #0b6b5f;
    }
    .time {
      font-size: 14px;
      margin-top: 4px;
      color: #008ecf;
    }
    .location {
      font-size: 14px;
      margin-top: 4px;
      color: #ff6b6b;
    }
    .duty {
      font-size: 14px;
      margin-top: 4px;
      color: #0aa6c8;
    }
    .match-date {
      font-size: 14px;
      margin-top: 4px;
      color: #0f745f;
    }
    .popup, .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .overlay {
      background: rgba(18, 196, 160, 0.35);
      z-index: 100;
    }
    .popup {
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 101;
    }
    .popup-content {
      background: linear-gradient(160deg, rgba(255, 247, 237, 0.98), rgba(255, 232, 200, 0.98));
      padding: 24px;
      border-radius: 16px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 14px 28px rgba(12, 83, 40, 0.25);
      border: 1px solid transparent;
      border-image: linear-gradient(45deg, rgba(193, 18, 31, 0.85), rgba(15, 155, 104, 0.85)) 1;
    }
    .popup-content input[type="tel"],
    .popup-content input[type="text"] {
      width: 80px;
      text-align: center;
      margin-bottom: 6px;
      font-size: 16px;
    }
    .popup-content textarea {
      width: 100%;
      height: 60px;
      margin-top: 10px;
      font-size: 16px;
    }
    .set-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 5px;
    }
    .popup-buttons {
      margin-top: 10px;
      text-align: right;
    }
    .popup-buttons button {
      margin-left: 10px;
      padding: 10px 16px;
    }
    .label-column {
      width: 150px;
      font-size: 13px;
    }
    .score-column {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .team-header {
      width: 80px;
      text-align: center;
      font-weight: 600;
    }
    .team-color {
      display: inline-block;
      padding: 2px 5px;
      border-radius: 4px;
      margin: 0 2px;
      color: var(--pine);
      background: rgba(255, 247, 237, 0.85);
    }
    .team-entry { cursor: pointer; }
    .team-color.highlight {
      background: rgba(255, 209, 102, 0.6);
      outline: 2px solid rgba(255, 209, 102, 0.95);
      box-shadow: 0 0 8px rgba(255, 209, 102, 0.75);
    }
    .ranking-table tr.highlight td {
      background: rgba(255, 209, 102, 0.35);
      box-shadow: 0 0 8px rgba(255, 209, 102, 0.55);
    }
    .division {
      display: inline-block;
      background: linear-gradient(120deg, rgba(18, 196, 160, 0.28), rgba(255, 111, 97, 0.28));
      color: var(--pine);
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .loading-spinner {
      width: 96px;
      height: 96px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 4px 10px rgba(255, 247, 237, 0.55));
    }
    .loading-spinner .loading-sprite {
      width: var(--loading-sprite-size, 88px);
      height: var(--loading-sprite-size, 88px);
      display: block;
      background-image: url('content/img/spritesheet.png');
      background-repeat: no-repeat;
      background-size: calc(var(--loading-sprite-size, 88px) * 3) var(--loading-sprite-size, 88px);
      background-position: 0 0;
      image-rendering: crisp-edges;
      animation: volleyball-sprite 0.9s steps(2) infinite;
    }
    .loading-text {
      font-size: 20px;
      letter-spacing: 0.5px;
      color: var(--pine);
    }
    .inline-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 24px;
      min-height: 180px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 209, 102, 0.65);
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(12, 83, 40, 0.18), 0 6px 14px rgba(255, 159, 112, 0.15);
    }
    .inline-loading .loading-text {
      color: var(--pine);
    }
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(18, 196, 160, 0.55);
      color: #fffaf2;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      z-index: 200;
    }
    .loading-overlay .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    .loading-overlay .loading-text {
      color: #fffaf2;
    }
    @keyframes volleyball-sprite {
      from { background-position: 0 0; }
      to { background-position: calc(var(--loading-sprite-size, 88px) * -2) 0; }
    }
    .tab-bar {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .tab-primary {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .tab-secondary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .tab-secondary button {
      flex: 1 1 0;
      padding: 12px 18px;
      font-size: 16px;
      border-bottom: 4px solid rgba(255, 111, 97, 0.85);
      text-align: center;
      white-space: nowrap;
    }
    .tab-secondary button.active {
      background: linear-gradient(120deg, #ff7f6a, #18c29c);
    }
    .all-tournaments-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: min(100%, 460px);
      max-width: 100%;
      padding: 14px 18px;
      font-size: 17px;
      background: linear-gradient(120deg, #ffe08a, #ff9364);
      color: #6b2c00;
      border-bottom: none;
      box-shadow: 0 12px 24px rgba(255, 159, 112, 0.25);
      letter-spacing: 0.3px;
      text-align: center;
      white-space: nowrap;
    }
    .all-tournaments-btn:hover {
      background: linear-gradient(120deg, #fff0b3, #ffad7e);
      box-shadow: 0 14px 26px rgba(255, 159, 112, 0.32);
    }
    .draw-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: min(100%, 460px);
      max-width: 100%;
      padding: 14px 18px;
      font-size: 17px;
      background: linear-gradient(120deg, #0d6f56, #0b5b53);
      color: #f4fff8;
      border-bottom: none;
      box-shadow: 0 12px 24px rgba(11, 91, 83, 0.28);
      letter-spacing: 0.3px;
      text-align: center;
      white-space: nowrap;
    }
    .draw-link-btn:hover {
      background: linear-gradient(120deg, #158567, #0d6f56);
      box-shadow: 0 14px 26px rgba(11, 91, 83, 0.36);
    }
    .live-actions {
      margin-bottom: 14px;
      display: flex;
      justify-content: flex-start;
    }
    .court-map-btn {
      padding: 8px 14px;
      font-size: 14px;
      background: linear-gradient(120deg, #0c4f8f, #08386a);
      color: #eff7ff;
      box-shadow: 0 8px 16px rgba(8, 56, 106, 0.26);
    }
    .court-map-btn:hover {
      background: linear-gradient(120deg, #1364b3, #0c4f8f);
      box-shadow: 0 10px 18px rgba(8, 56, 106, 0.33);
    }
    .image-popup-content {
      max-width: min(1000px, 96vw);
      width: auto;
      padding: 14px;
    }
    .zoomable-map-wrap {
      max-height: 76vh;
      overflow: auto;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(12, 79, 143, 0.25);
    }
    .zoomable-map {
      display: block;
      width: 100%;
      height: auto;
      cursor: zoom-in;
      transform-origin: top left;
      transition: transform 0.2s ease;
    }
    .zoomable-map.zoomed {
      transform: scale(1.8);
      cursor: zoom-out;
    }
    .all-tournaments-btn .all-tournaments-line {
      display: inline;
      white-space: nowrap;
    }
    .division-tabs {
      margin-bottom: 15px;
    }
    .division-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 5px;
    }
    .division-tabs button {
      color: #fffaf2;
    }
    .division-row button.active {
      background: linear-gradient(120deg, #ff7f6a, #18c29c);
    }
    .finals-row button {
      background: linear-gradient(120deg, #12c4a0, #1d9df2);
    }
    .finals-row button.active {
      background: linear-gradient(120deg, #0fd3bb, #1a86d1);
    }
    .ranking-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .ranking-table th {
      background: linear-gradient(120deg, #ff7f6a, #18c29c);
      color: #fffaf2;
      padding: 6px;
    }
    .ranking-table td {
      border: 1px solid rgba(18, 196, 160, 0.25);
      padding: 6px;
      text-align: center;
    }
    .auto-renew-note {
      font-size: 14px;
      margin-bottom: 5px;
      color: #0f7a67;
    }
    .finals-toggle-wrap {
      margin-bottom: 10px;
    }
    .finals-toggle-btn {
      font-size: 14px;
      padding: 8px 14px;
      background: linear-gradient(120deg, #0c4f8f, #08386a);
      color: #eff7ff;
      box-shadow: 0 8px 16px rgba(8, 56, 106, 0.26);
    }
    .finals-toggle-btn:hover {
      background: linear-gradient(120deg, #1364b3, #0c4f8f);
      box-shadow: 0 10px 18px rgba(8, 56, 106, 0.33);
    }
    .match-days {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }
    .match-day {
      flex: 1 1 340px;
      min-width: 320px;
      margin-bottom: 15px;
    }
    .match-day.finals-day {
      background: linear-gradient(135deg, #ffe39a 0%, #f3be42 100%);
      border: 1px solid rgba(184, 130, 0, 0.45);
      box-shadow: 0 12px 24px rgba(184, 130, 0, 0.25);
    }
    .match-day.finals-day .date-header {
      color: #8a5a00;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      font-size: 1.35em;
      font-weight: 800;
      text-align: center;
    }
    .date-header {
      font-weight: 600;
      margin-bottom: 6px;
      color: #0c7c6f;
    }
    .match-result {
      width: 100%;
      margin: 0 0 6px;
    }
    .match-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .match-header .team-color {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: normal; /* allow team names to wrap */
      overflow-wrap: anywhere;
      text-align: center;
    }
    .match-header .team-color:first-child {
      text-align: center;
    }
    .match-header .team-color:last-child {
      text-align: center;
    }
    .match-header .team-color.finals-winner {
      font-size: 1.18em;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 10px;
      padding: 2px 8px;
      box-shadow: 0 3px 10px rgba(138, 90, 0, 0.2);
    }
    .match-header .team-color.finals-loser {
      background: #ececec;
      color: #666 !important;
      border-radius: 10px;
      padding: 2px 8px;
    }
    .finals-medal {
      margin-left: 4px;
      font-size: 1.05em;
    }
    .match-header .set-count {
      flex: 0 0 auto;
      margin: 0 4px;
      display: inline-flex;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      color: #ff6b6b;
      white-space: nowrap;
    }
    .set-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 4px;
      table-layout: fixed;
    }
    .set-table th, .set-table td {
      padding: 1px 4px;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
    }
    .set-table th.set-num {
      text-align: center;
      font-size: 12px;
      color: #999;
    }
    .set-score {
      font-size: 16px;
      font-weight: 600;
    }

    .bracket {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 10px;
    }
    .bracket .round {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }
    .bracket .match {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .bracket .team-block {
      text-align: center;
      margin: 4px 0;
    }
    .bracket .score-lines {
      font-size: 12px;
      line-height: 1.1;
    }
    .bracket .set-count {
      font-size: 20px;
      font-weight: bold;
      color: #ff6b6b;
      margin: 4px 0;
    }
    .bracket .line {
      width: 2px;
      height: 30px;
      background: rgba(18, 196, 160, 0.6);
    }
    .bracket .champion {
      font-weight: bold;
      font-size: 22px;
      color: #0c7c6f;
    }

    .bracket.horizontal {
      flex-direction: row;
      align-items: center;
    }
    .bracket.horizontal .round {
      align-items: flex-start;
    }
    .bracket.horizontal .match {
      align-items: flex-start;
    }
    .bracket.horizontal .line {
      width: 40px;
      height: 2px;
      background: rgba(18, 196, 160, 0.6);
    }

    .bracket-gallery {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      margin-bottom: 20px;
    }
    .bracket-gallery img {
      width: 100%;
      max-width: 1200px;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(12, 83, 40, 0.2), 0 8px 20px rgba(255, 159, 112, 0.18);
    }

    @media (max-width: 600px) {
      .site-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .tournament-logo-text {
        font-size: 14px;
      }
      .tab-secondary {
        flex-direction: column;
      }
      .tab-secondary button {
        width: 100%;
      }
      .all-tournaments-btn {
        width: 100%;
        flex-direction: column;
        font-size: 15px;
        white-space: normal;
        line-height: 1.3;
      }
      .draw-link-btn {
        width: 100%;
        flex-direction: column;
        font-size: 15px;
        white-space: normal;
        line-height: 1.3;
      }
      .all-tournaments-btn .all-tournaments-line {
        display: block;
      }
    }
    @media (max-width: 1024px) and (min-width: 601px) {
      .all-tournaments-btn {
        width: 100%;
        flex-direction: column;
        font-size: 16px;
        white-space: normal;
        line-height: 1.3;
      }
      .draw-link-btn {
        width: 100%;
        flex-direction: column;
        font-size: 16px;
        white-space: normal;
        line-height: 1.3;
      }
      .all-tournaments-btn .all-tournaments-line {
        display: block;
      }
    }

  
    /* ===== Tournament landing page ===== */
    .tournament-page {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      padding-top: 32px;
    }
    .tournament-page-inner {

<body>

  <script>
    let scheduleData = {};
    let defaultDate = "";
    let teamColorMap = {};
    let divisionColorMap = {};
    let highlightedTeamKey = null;
    const bracketsEnabled = false;
    const colorPalette = [
      '#ff1744', '#008142', '#2979ff', '#ff9100', '#d500f9',
      '#f50057', '#651fff', '#00bfa5', '#ccbb00', '#459810',
      '#00b0ff', '#ff4081'
    ];
    const apiUrl = "https://script.google.com/macros/s/AKfycbwnepQmr17n-HfyRJozYlrFiCLbytZ7iDYszrCDANdenKKRbKvKdrHUTApe1ZbO4A/exec";

    let currentTournament = "";
    const tournamentMetaCache = {};
    const SCHEDULE_CACHE_TTL_MS = 30 * 1000;
    const LIVE_RESULTS_CACHE_TTL_MS = 15 * 1000;

    function isLunarCupTournament(name) {
      return typeof name === "string" && /lunar cup/i.test(name.trim());
    }

    function isPickleballTournament(name) {
      return typeof name === "string" && /pickleball/i.test(name);
    }

    function usePickleballRules() {
      return isPickleballTournament(currentTournament);
    }

    function getSetLabels() {
      if (usePickleballRules()) {
        return ["Singles A", "Singles B", "Doubles G1", "Doubles G2"];
      }
      return ["1st Set", "2nd Set", "3rd Set", "4th Set", "5th Set"];
    }

    function getScoreInputSetCount() {
      return usePickleballRules() ? 4 : 3;
    }

    function getSetWinnerDelta(saRaw, sbRaw, division = "") {
      const sa = parseInt(saRaw, 10);
      const sb = parseInt(sbRaw, 10);
      if (isNaN(sa) || isNaN(sb)) return null;

      if (usePickleballRules()) {
        if (sa < 7 && sb < 7) return 0;
        if (sa >= 11 || sb >= 11) {
          if (sa > sb) return 1;
          if (sb > sa) return -1;
          return 0;
        }
        if (Math.abs(sa - sb) >= 2) {
          if (sa > sb) return 1;
          if (sb > sa) return -1;
        }
        return 0;
      }

      const diff = Math.abs(sa - sb);
      const isLeague = /league/i.test(division);
      const minPts = isLeague ? 12 : 8;
      if ((sa >= minPts || sb >= minPts) && diff >= 2) {
        if (sa > sb) return 1;
        if (sb > sa) return -1;
      }
      return 0;
    }

    function updateSiteSportLogo(tournamentName) {
      const logo = document.getElementById("siteSportLogo");
      if (!logo) return;
      logo.src = isPickleballTournament(tournamentName)
        ? "content/img/pickleball.png"
        : "content/img/logo.png";
    }

    function setLunarCupTheme(isActive) {
      document.body.classList.toggle("lunar-cup-theme", Boolean(isActive));
    }

    function getScheduleCacheKey(tournament) {
      return `sparrows:schedule:${tournament || ""}`;
    }

    function readScheduleCache(tournament) {
      if (!tournament || typeof localStorage === "undefined") return null;
      try {
        const raw = localStorage.getItem(getScheduleCacheKey(tournament));
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return null;
        return { data: parsed.data, timestamp: parsed.timestamp || 0 };
      } catch (err) {
        console.warn("Failed to read schedule cache", err);
        return null;
      }
    }

    function writeScheduleCache(tournament, data) {
      if (!tournament || typeof localStorage === "undefined") return;
      try {
        localStorage.setItem(
          getScheduleCacheKey(tournament),
          JSON.stringify({ data, timestamp: Date.now() })
        );
      } catch (err) {
        console.warn("Failed to write schedule cache", err);
      }
    }

    function clearScheduleCache(tournament) {
      if (!tournament || typeof localStorage === "undefined") return;
      try {
        localStorage.removeItem(getScheduleCacheKey(tournament));
      } catch (err) {
        console.warn("Failed to clear schedule cache", err);
      }
    }

    function getLiveResultsCacheKey(tournament) {
      return `sparrows:live-results:${tournament || ""}`;
    }

    function readLiveResultsCache(tournament) {
      if (!tournament || typeof localStorage === "undefined") return null;
      try {
        const raw = localStorage.getItem(getLiveResultsCacheKey(tournament));
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return null;
        return { data: parsed.data, timestamp: parsed.timestamp || 0 };
      } catch (err) {
        console.warn("Failed to read live results cache", err);
        return null;
      }
    }

    function writeLiveResultsCache(tournament, data) {
      if (!tournament || typeof localStorage === "undefined") return;
      try {
        localStorage.setItem(
          getLiveResultsCacheKey(tournament),
          JSON.stringify({ data, timestamp: Date.now() })
        );
      } catch (err) {
        console.warn("Failed to write live results cache", err);
      }
    }

    function clearLiveResultsCache(tournament) {
      if (!tournament || typeof localStorage === "undefined") return;
      try {
        localStorage.removeItem(getLiveResultsCacheKey(tournament));
      } catch (err) {
        console.warn("Failed to clear live results cache", err);
      }
    }

    function updateTournamentInUrl(name) {
      const params = new URLSearchParams(window.location.search);
      if (name) {
        params.set("tournament", name);
      } else {
        params.delete("tournament");
      }
      const newQuery = params.toString();
      const newUrl = newQuery ? `${window.location.pathname}?${newQuery}` : window.location.pathname;
      history.replaceState({}, "", newUrl);
    }

    function normalizeTournamentEntry(entry) {
      if (typeof entry === "string") {
        return { name: entry, subtitle: "", drawLink: "" };
      }
      if (entry && typeof entry === "object") {
        return {
          name: entry.name || entry.tournament || "",
          subtitle: entry.webSubtitleLine1 || entry.subtitle || entry.webSubtitle || "",
          drawLink: typeof entry.drawLink === "string" ? entry.drawLink.trim() : ""
        };
      }
      return { name: "", subtitle: "", drawLink: "" };
    }

    const TOURNAMENT_LIST_CACHE_KEY = "sparrows:tournaments:list";
    const TOURNAMENT_LIST_CACHE_TTL = 30 * 1000;
    const SPECIAL_TOURNAMENTS = {
      "SPARROWS PRESEASON [VALENTINES] CUP #1 2026": {
        drawUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnrD6ea7L78py8i-VcFc05kaeIJPyQvy2p3TrF07m6ntlmC1Ck01yv_7YTWMY0b7I_MHu3fpGWRQWx/pubhtml",
        showCourtMap: true
      },
      "SPARROWS PRESEASON CUP #2 2026": {
        drawUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpUYobgGrECiv2e4bWvMTbCch85ItUBHvytG8HvOaM7KeI8wodLMGc_B8ltp3S8RhC6XkLuXkFWYxG/pubhtml",
        showCourtMap: true
      }
    };

    function getSpecialTournamentConfig(name) {
      if (typeof name !== "string") return null;
      const normalizedName = name.trim().toLowerCase();
      return Object.entries(SPECIAL_TOURNAMENTS).find(([tournamentName]) => {
        return tournamentName.toLowerCase() === normalizedName;
      })?.[1] || null;
    }

    function getTournamentDrawLink(name) {
      return tournamentMetaCache[name]?.drawLink || "";
    }

    function updateSpecialTournamentButtons(tournamentName) {
      const config = getSpecialTournamentConfig(tournamentName);
      const drawBtn = document.getElementById("drawLinkBtn");
      const courtMapBtn = document.getElementById("courtMapBtn");
      if (drawBtn) drawBtn.style.display = getTournamentDrawLink(tournamentName) ? "inline-flex" : "none";
      if (courtMapBtn) courtMapBtn.style.display = config?.showCourtMap ? "inline-flex" : "none";
    }

    function readTournamentListCache() {
      if (typeof localStorage === "undefined") return null;
      try {
        const raw = localStorage.getItem(TOURNAMENT_LIST_CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.tournaments)) return null;
        return parsed;
      } catch (err) {
        console.warn("Failed to read tournament cache", err);
        return null;
      }
    }

    function writeTournamentListCache(tournaments) {
      if (typeof localStorage === "undefined") return;
      try {
        localStorage.setItem(TOURNAMENT_LIST_CACHE_KEY, JSON.stringify({
          timestamp: Date.now(),
          tournaments
        }));
      } catch (err) {
        console.warn("Failed to write tournament cache", err);
      }
    }

    async function fetchTournamentMeta(name) {
      if (tournamentMetaCache[name]) return tournamentMetaCache[name];
      const res = await fetch(`${apiUrl}?tournament=${encodeURIComponent(name)}`, { cache: "no-store" });
      const json = await res.json();
      const subtitle = (json.webSubtitleLine1 || "").trim();
      const drawLink = typeof json.drawLink === "string" ? json.drawLink.trim() : "";
      tournamentMetaCache[name] = { subtitle, drawLink };
      return tournamentMetaCache[name];
    }

    function showTournamentPage() {
      document.getElementById("tournamentPage").style.display = "flex";
      document.getElementById("appPage").style.display = "none";
      setLunarCupTheme(false);
      updateSpecialTournamentButtons(null);
      updateSiteSportLogo(null);
    }

    function showAppPage() {
      document.getElementById("tournamentPage").style.display = "none";
      document.getElementById("appPage").style.display = "block";
    }

    async function loadTournamentList({ showLoader = true } = {}) {
      const listEl = document.getElementById("tournamentList");
      const errEl = document.getElementById("tournamentError");
      listEl.innerHTML = "";
      errEl.style.display = "none";
      errEl.textContent = "";

      const cached = readTournamentListCache();
      const hasCachedData = cached && Array.isArray(cached.tournaments) && cached.tournaments.length > 0;
      const cacheAge = cached && cached.timestamp ? Date.now() - cached.timestamp : Infinity;
      const isCacheStale = cacheAge > TOURNAMENT_LIST_CACHE_TTL;

      function getTournamentCardLogo(name) {
        return /pickleball/i.test(name)
          ? "content/img/pickleball.png"
          : "content/img/volleyball.png";
      }

      function renderTournaments(normalized) {
        listEl.innerHTML = "";
        normalized.forEach(({ name, subtitle, drawLink }) => {
          const card = document.createElement("div");
          card.className = "tournament-card";
          card.innerHTML = `
            <div class="tournament-card-logo-wrap">
              <img class="tournament-card-logo" src="${getTournamentCardLogo(name)}" alt="Tournament sport logo" />
            </div>
            <div class="tournament-card-text">
              <div class="tournament-card-name"></div>
              <p class="tournament-card-subtitle"></p>
            </div>
          `;
          card.querySelector(".tournament-card-name").textContent = name;
          const subtitleEl = card.querySelector(".tournament-card-subtitle");
          if (subtitle) {
            subtitleEl.textContent = subtitle;
            tournamentMetaCache[name] = { subtitle, drawLink };
          } else {
            subtitleEl.textContent = " ";
            fetchTournamentMeta(name).then(meta => {
              if (subtitleEl && meta && meta.subtitle) {
                subtitleEl.textContent = meta.subtitle;
              }
              updateSpecialTournamentButtons(currentTournament);
            }).catch(() => {});
          }

          card.addEventListener("click", async () => {
            await enterTournament(name);
          });

          listEl.appendChild(card);
        });
      }

      if (hasCachedData) {
        renderTournaments(cached.tournaments);
      }

      const shouldFetch = !hasCachedData || isCacheStale;
      const loaderActive = showLoader && shouldFetch;
      if (loaderActive) showLoading("Loading tournaments...");

      try {
        if (!shouldFetch) return;

        const res = await fetch(`${apiUrl}?action=listTournaments`, { cache: "no-store" });
        const json = await res.json();

        if (!json || !json.ok) {
          throw new Error((json && json.error) ? json.error : "Failed to load tournaments");
        }

        if (!Array.isArray(json.tournaments) || json.tournaments.length === 0) {
          throw new Error("No tournaments found. Check your Config sheet (enabled=TRUE) and make sure this web app is deployed.");
        }

        const normalized = json.tournaments
          .map(normalizeTournamentEntry)
          .filter(t => t && t.name);

        writeTournamentListCache(normalized);
        renderTournaments(normalized);

      } catch (err) {
        if (!hasCachedData) {
          errEl.style.display = "block";
          errEl.textContent = String(err && err.message ? err.message : err);
        } else {
          console.warn("Failed to refresh tournaments", err);
        }
      } finally {
        if (loaderActive) hideLoading();
      }
    }

    function clearLiveResultsUI() {
      const regRow = document.getElementById('divisionRowRegular');
      const finRow = document.getElementById('divisionRowFinals');
      const container = document.getElementById('divisionContent');
      if (regRow) regRow.innerHTML = '';
      if (finRow) finRow.innerHTML = '';
      if (container) container.innerHTML = '';
    }

    async function enterTournament(name, { showLoader = true } = {}) {
      currentTournament = name;
      updateTournamentInUrl(name);
      setLunarCupTheme(isLunarCupTournament(name));
      updateSpecialTournamentButtons(name);
      updateSiteSportLogo(name);
      fetchTournamentMeta(name)
        .then(() => updateSpecialTournamentButtons(name))
        .catch(() => {});

      // Reset filters / in-memory state (safe even if already empty)
      scheduleData = {};
      selectedDate = "";
      selectedTeam = "";
      selectedDivision = "";
      selectedCourt = "";
      liveResults = {};
      currentDivision = null;
      combinedDivisions = null;
      hideNonFinalsMatches = false;
      finalsVisibilityPreference = null;
      liveResultsLoadingPromise = null;
      stopLiveResultsAutoRefresh();
      clearLiveResultsUI();

      if (showLoader) showLoading("Data retrieving");
      showAppPage();
      showTab("schedule");
      // Begin loading live results in the background so they are ready
      // whenever the user visits the Live Results tab.
      ensureLiveResultsLoaded();

      let scheduleError = null;
      try {
        await fetchSchedule(name);
      } catch (err) {
        scheduleError = err;
      } finally {
        if (showLoader) hideLoading();
      }

      if (scheduleError) throw scheduleError;
    }

    function bindBackButton() {
      const btn = document.getElementById("backToTournamentsBtn");
      if (!btn) return;
      btn.addEventListener("click", async () => {
        updateTournamentInUrl(null);
        showTournamentPage();
        await loadTournamentList();
      });
    }

    function openCourtMapPopup() {
      const overlay = document.createElement("div");
      overlay.className = "overlay";

      const popup = document.createElement("div");
      popup.className = "popup";

      const content = document.createElement("div");
      content.className = "popup-content image-popup-content";

      const mapWrap = document.createElement("div");
      mapWrap.className = "zoomable-map-wrap";

      const mapImage = document.createElement("img");
      mapImage.className = "zoomable-map";
      mapImage.src = "content/img/sporthall_map.png";
      mapImage.alt = "Sporthall court map";
      mapImage.addEventListener("click", () => {
        mapImage.classList.toggle("zoomed");
      });

      const actions = document.createElement("div");
      actions.className = "popup-buttons";

      const closeBtn = document.createElement("button");
      closeBtn.textContent = "Close";

      const closePopup = () => {
        overlay.remove();
        popup.remove();
      };

      closeBtn.addEventListener("click", closePopup);
      overlay.addEventListener("click", closePopup);

      mapWrap.appendChild(mapImage);
      actions.appendChild(closeBtn);
      content.appendChild(mapWrap);
      content.appendChild(actions);
      popup.appendChild(content);
      document.body.appendChild(overlay);
      document.body.appendChild(popup);
    }

    function bindSpecialTournamentButtons() {
      const drawBtn = document.getElementById("drawLinkBtn");
      const courtMapBtn = document.getElementById("courtMapBtn");
      if (drawBtn) {
        drawBtn.addEventListener("click", () => {
          const drawLink = getTournamentDrawLink(currentTournament);
          if (!drawLink) return;
          window.open(drawLink, "_blank", "noopener,noreferrer");
        });
      }
      if (courtMapBtn) {
        courtMapBtn.addEventListener("click", openCourtMapPopup);
      }
    }
    if (!bracketsEnabled) {
      const bracketsTab = document.getElementById("bracketsTab");
      const bracketsSection = document.getElementById("bracketsSection");
      if (bracketsTab) {
        bracketsTab.style.display = "none";
        bracketsTab.setAttribute("aria-hidden", "true");
        bracketsTab.setAttribute("tabindex", "-1");
      }
      if (bracketsSection) {
        bracketsSection.setAttribute("hidden", "true");
      }
    }

    function showTab(tab) {
      if (tab === "brackets" && !bracketsEnabled) tab = "schedule";
      document.getElementById("scheduleSection").style.display = tab === "schedule" ? "block" : "none";
      document.getElementById("liveResultsSection").style.display = tab === "live" ? "block" : "none";
      document.getElementById("bracketsSection").style.display = tab === "brackets" ? "block" : "none";
      document.getElementById("scheduleTab").classList.toggle("active", tab === "schedule");
      document.getElementById("liveTab").classList.toggle("active", tab === "live");
      document.getElementById("bracketsTab").classList.toggle("active", tab === "brackets");
      if (tab === "live") {
        ensureLiveResultsLoaded();
        startLiveResultsAutoRefresh();
      } else {
        stopLiveResultsAutoRefresh();
        highlightTeam(null);
      }
    }

    function handleLiveTabClick() {
      const liveSectionVisible = document.getElementById("liveResultsSection").style.display === "block";
      if (liveSectionVisible && currentTournament && !liveResultsLoadingPromise) {
        clearLiveResultsCache(currentTournament);
        liveResultsLoadingPromise = fetchResults(currentTournament, { allowCache: false, forceRefresh: true })
          .catch(err => {
            console.error("Failed to force refresh live results", err);
          })
          .finally(() => { liveResultsLoadingPromise = null; });
      }
      showTab("live");
    }


    function showLoading(message = "Loading...") {
      let overlay = document.querySelector(".loading-overlay");
      if (!overlay) {
        overlay = document.createElement("div");
        overlay.className = "loading-overlay";
        document.body.appendChild(overlay);
      }
      overlay.innerHTML = "";
      const content = document.createElement("div");
      content.className = "loading-content";

      const spinner = document.createElement("div");
      spinner.className = "loading-spinner";
      spinner.setAttribute("aria-hidden", "true");
      spinner.innerHTML = `
        <div class="loading-sprite"></div>
      `;

      const text = document.createElement("div");
      text.className = "loading-text";
      text.textContent = message;

      content.appendChild(spinner);
      content.appendChild(text);
      overlay.appendChild(content);
    }

    function hideLoading() {
      const overlay = document.querySelector(".loading-overlay");
      if (overlay) overlay.remove();
    }

    function assignTeamColors() {
      teamColorMap = {};
      divisionColorMap = {};
      const allTeams = new Set();
      for (const date in scheduleData) {
        (scheduleData[date] || []).forEach(m => {
          if (m.team) allTeams.add(m.team);
          if (m.opponent) allTeams.add(m.opponent);
        });
      }
      const schedule = liveResults.schedule || {};
      for (const date in schedule) {
        (schedule[date] || []).forEach(m => {
          if (m.team) allTeams.add(m.team);
          if (m.opponent) allTeams.add(m.opponent);
        });
      }
      const divisions = Object.keys(liveResults.divisions || {});
      divisions.forEach((div, i) => {
        divisionColorMap[div] = colorPalette[i % colorPalette.length];
        (liveResults.divisions[div].standings || []).forEach(s => allTeams.add(s.team));
      });

      let idx = 0;
      allTeams.forEach(t => {
        if (!t) return;
        const key = normalizeName(t);
        teamColorMap[key] = colorPalette[idx % colorPalette.length];
        idx++;
      });
    }

    function getTeamColor(team) {
      const key = normalizeName(team);
      // Use a dark fallback color when no mapping exists to ensure
      // text remains readable on a white background
      return teamColorMap[key] || '#333';
    }

    function getDivisionColor(div) {
      return divisionColorMap[div] || '#333';
    }

    function hexToRgb(hex) {
      const res = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return res ? [parseInt(res[1],16), parseInt(res[2],16), parseInt(res[3],16)] : [0,0,0];
    }

    function getDutyColor(duty) {
      if (!duty) return null;
      const norm = normalizeName(duty);
      for (const key in teamColorMap) {
        if (norm.includes(key)) {
          return hexToRgb(teamColorMap[key]);
        }
      }
      return null;
    }

    let teamNameMap = {};
    function normalizeName(name) {
      return (name || "").trim().toLowerCase();
    }

    function isFinalsDateLabel(dateLabel) {
      return /finals/i.test(String(dateLabel || ''));
    }

    function normalizeDivisionName(division) {
      const sanitized = String(division || '').trim();
      return sanitized || 'Main Division';
    }

    function computeStandings(schedule, { excludeFinalsDates = false } = {}) {
      const divStats = {};
      for (const date in schedule || {}) {
        if (excludeFinalsDates && isFinalsDateLabel(date)) continue;
        (schedule[date] || []).forEach(match => {
          const { division, team, opponent, scores = {} } = match || {};
          const a = scores.a || [];
          const b = scores.b || [];
          const div = normalizeDivisionName(division);
          divStats[div] = divStats[div] || {};

          const tA = divStats[div][team] ||
            { wins: 0, losses: 0, draws: 0, setsWon: 0, setsLost: 0, pointsWon: 0, pointsLost: 0 };
          const tB = divStats[div][opponent] ||
            { wins: 0, losses: 0, draws: 0, setsWon: 0, setsLost: 0, pointsWon: 0, pointsLost: 0 };

          if (a.length || b.length) {
            let swA = 0, swB = 0, sd = 0;
            const len = Math.max(a.length, b.length);
            for (let i = 0; i < len; i++) {
              const sa = parseInt(a[i]);
              const sb = parseInt(b[i]);
              if (!isNaN(sa)) {
                tA.pointsWon += sa;
                tB.pointsLost += sa;
              }
              if (!isNaN(sb)) {
                tA.pointsLost += sb;
                tB.pointsWon += sb;
              }
              const winnerDelta = getSetWinnerDelta(sa, sb, div);
              if (winnerDelta === 1) swA++;
              else if (winnerDelta === -1) swB++;
              else if (winnerDelta === 0) sd++;
            }
            tA.setsWon += swA; tA.setsLost += swB;
            tB.setsWon += swB; tB.setsLost += swA;
            if (usePickleballRules()) {
              tA.wins += swA;
              tA.losses += swB;
              tA.draws += sd;
              tB.wins += swB;
              tB.losses += swA;
              tB.draws += sd;
            } else if (swA > swB) {
              tA.wins++; tB.losses++;
            } else if (swB > swA) {
              tB.wins++; tA.losses++;
            } else {
              tA.draws++; tB.draws++;
            }
          }

          divStats[div][team] = tA;
          divStats[div][opponent] = tB;
        });
      }
      const result = {};
      for (const div in divStats) {
        const teams = divStats[div];
        const arr = Object.keys(teams).map(t => ({ team: t, ...teams[t] }));
        arr.forEach(team => {
          team.setPct = team.setsWon + team.setsLost > 0
            ? team.setsWon / (team.setsWon + team.setsLost)
            : 0;
          team.pointsPct = team.pointsWon + team.pointsLost > 0
            ? team.pointsWon / (team.pointsWon + team.pointsLost)
            : 0;
        });
        if (usePickleballRules()) {
          arr.forEach(team => {
            team.pointDiff = team.pointsWon - team.pointsLost;
          });
          arr.sort((a, b) => b.wins - a.wins || b.pointDiff - a.pointDiff);
        } else {
          arr.sort((a, b) =>
            b.wins - a.wins ||
            b.draws - a.draws ||
            b.setPct - a.setPct ||
            b.pointsPct - a.pointsPct
          );
        }
        let rank = 1;
        arr.forEach((team, i) => {
          if (i === 0) {
            team.rank = 1;
          } else {
            const prev = arr[i - 1];
            const isSameRank = usePickleballRules()
              ? team.wins === prev.wins && (team.pointDiff || 0) === (prev.pointDiff || 0)
              : team.wins === prev.wins && team.draws === prev.draws && team.setPct === prev.setPct && team.pointsPct === prev.pointsPct;
            if (isSameRank) {
              team.rank = prev.rank;
            } else {
              team.rank = i + 1;
            }
          }
        });
        result[div] = { standings: arr };
      }
      return result;
    }

    function normalizeSchedule(rawSchedule, { includeRowIndex = false } = {}) {
      const output = {};
      if (Array.isArray(rawSchedule)) {
        rawSchedule.forEach((match, idx) => {
          if (!match) return;
          const dateKey = match.date || match.matchDate || 'Unknown Date';
          const entry = { ...match };
          entry.division = normalizeDivisionName(entry.division);
          entry.dutyTeam = entry.dutyTeam || '';
          if (includeRowIndex) entry.rowIndex = idx;
          (output[dateKey] ||= []).push(entry);
        });
        return output;
      }
      if (rawSchedule && typeof rawSchedule === 'object') {
        for (const date in rawSchedule) {
          const matches = rawSchedule[date];
          if (!Array.isArray(matches)) continue;
          output[date] = matches
            .map((m, i) => {
              if (!m) return null;
              const entry = { ...m };
              entry.division = normalizeDivisionName(entry.division);
              entry.dutyTeam = entry.dutyTeam || '';
              if (includeRowIndex && entry.rowIndex === undefined) entry.rowIndex = i;
              return entry;
            })
            .filter(Boolean);
        }
      }
      return output;
    }

    function applySchedulePayload(json) {
      if (!json || typeof json !== "object") return;
      scheduleData = {};
      teamNameMap = {};

      const headerEl = document.querySelector('#appPage .header-text h1');
      if (json.webHeader && headerEl) {
        headerEl.textContent = json.webHeader;
      }

      const descEl = document.querySelector('p.description');
      if (descEl) {
        const subtitleLines = [json.webSubtitleLine1, json.webSubtitleLine2, json.webSubtitleLine3]
          .filter(line => typeof line === 'string' && line.trim() !== '')
          .map(line => line
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;'));
        descEl.innerHTML = subtitleLines.join('<br>');
      }

      const normalizedSchedule = normalizeSchedule(json.schedule, { includeRowIndex: true });
      for (const date in normalizedSchedule) {
        scheduleData[date] = normalizedSchedule[date];
        scheduleData[date].forEach(m => {
          if (m.team) teamNameMap[normalizeName(m.team)] = m.team;
          if (m.opponent) teamNameMap[normalizeName(m.opponent)] = m.opponent;
          if (m.dutyTeam) teamNameMap[normalizeName(m.dutyTeam)] = m.dutyTeam;
        });
      }
      const scheduleDates = Object.keys(scheduleData);
      const sanitizedDefault = (json.defaultDate || "").trim();
      defaultDate = sanitizedDefault && scheduleDates.includes(sanitizedDefault)
        ? sanitizedDefault
        : "";
      populateFilters();
      document.getElementById("dateFilter").value = defaultDate;
      filterResults();
      assignTeamColors();
    }

    async function fetchSchedule(tournamentName = currentTournament) {
      const requestedTournament = tournamentName || "";
      if (!requestedTournament) return;

      const cached = readScheduleCache(requestedTournament);
      const hasCachedData = cached && cached.data;
      const isCacheFresh = hasCachedData && (Date.now() - cached.timestamp < SCHEDULE_CACHE_TTL_MS);
      if (hasCachedData && requestedTournament === currentTournament) {
        applySchedulePayload(cached.data);
      }

      const fetchAndApply = async () => {
        const res = await fetch(`${apiUrl}?tournament=${encodeURIComponent(requestedTournament)}`, { cache: "no-store" });
        const json = await res.json();
        writeScheduleCache(requestedTournament, json);
        if (requestedTournament === currentTournament) {
          applySchedulePayload(json);
        }
      };

      if (isCacheFresh) {
        return;
      }

      if (hasCachedData) {
        fetchAndApply().catch(err => {
          console.error("Failed to refresh schedule", err);
        });
        return;
      }

      await fetchAndApply();
    }

    let liveResults = {};
    let currentDivision = null;
    let combinedDivisions = null;
    let hideNonFinalsMatches = false;
    let finalsVisibilityPreference = null;
    let liveResultsLoadingPromise = null;
    let liveResultsRefreshTimer = null;
    const LIVE_RESULTS_REFRESH_MS = 15 * 1000;

    function showLiveResultsLoading(message = "Loading live results...") {
      const container = document.getElementById('divisionContent');
      if (container) {
        container.innerHTML = `
          <div class="inline-loading" role="status" aria-live="polite">
            <div class="loading-spinner"><div class="loading-sprite"></div></div>
            <div class="loading-text">${message}</div>
          </div>
        `;
      }
    }

    function ensureLiveResultsLoaded() {
      if (liveResultsLoadingPromise) return;
      const requestedTournament = currentTournament;
      if (!requestedTournament) return;
      const cached = readLiveResultsCache(requestedTournament);
      const hasCachedData = cached && cached.data;

      if (!hasCachedData && (!liveResults || !Object.keys(liveResults).length)) {
        clearLiveResultsUI();
        showLiveResultsLoading();
      }

      liveResultsLoadingPromise = fetchResults(requestedTournament, { allowCache: true, forceRefresh: false })
        .catch(err => {
          console.error("Failed to load live results", err);
          const container = document.getElementById('divisionContent');
          if (container) {
            container.innerHTML = '<div class="tournament-error">Failed to load live results. Please try again.</div>';
          }
        })
        .finally(() => { liveResultsLoadingPromise = null; });

    }

    function stopLiveResultsAutoRefresh() {
      if (liveResultsRefreshTimer) {
        clearInterval(liveResultsRefreshTimer);
        liveResultsRefreshTimer = null;
      }
    }

    function startLiveResultsAutoRefresh() {
      stopLiveResultsAutoRefresh();
      if (!currentTournament) return;
      liveResultsRefreshTimer = setInterval(() => {
        if (document.getElementById("liveResultsSection").style.display !== "block") return;
        if (liveResultsLoadingPromise) return;
        fetchResults(currentTournament, { allowCache: false, forceRefresh: true }).catch(err => {
          console.error("Failed to auto refresh live results", err);
        });
      }, LIVE_RESULTS_REFRESH_MS);
    }

    function applyLiveResultsPayload(payload, tournamentName) {
      if (tournamentName !== currentTournament) return false;
      liveResults = payload;
      if (!liveResults.schedule) {
        liveResults = { schedule: liveResults };
      }
      liveResults.schedule = normalizeSchedule(liveResults.schedule);
      liveResults.divisions = computeStandings(liveResults.schedule);
      const regRow = document.getElementById('divisionRowRegular');
      const finRow = document.getElementById('divisionRowFinals');
      if (regRow) regRow.innerHTML = '';
      if (finRow) finRow.innerHTML = '';
      const divisions = Object.keys(liveResults.divisions || {});
      if (!divisions.length) return true;
      const collator = new Intl.Collator(undefined, { numeric: true, sensitivity: 'base' });
      const sortedDivisions = divisions.slice().sort(collator.compare);
      const combineBtn = document.getElementById('combineViewBtn');
      const divisionTabs = document.getElementById('divisionTabs');
      const pickleballMode = usePickleballRules();
      const nonFinalDivs = sortedDivisions.filter(d => !/finals/i.test(d));
      combineBtn.style.display = pickleballMode ? 'none' : (nonFinalDivs.length > 1 ? 'inline-block' : 'none');
      if (divisionTabs) divisionTabs.style.display = pickleballMode ? 'none' : '';
      sortedDivisions.forEach((div, idx) => {
        const btn = document.createElement('button');
        btn.textContent = div;
        btn.dataset.division = div;
        if ((currentDivision ? div === currentDivision : idx === 0)) btn.classList.add('active');
        btn.onclick = () => showDivision(div);
        if (/finals/i.test(div)) finRow.appendChild(btn); else regRow.appendChild(btn);
      });
      assignTeamColors();
      if (!currentDivision) currentDivision = sortedDivisions[0];
      if (pickleballMode) {
        showCombinedDivisions(nonFinalDivs.length ? nonFinalDivs : sortedDivisions);
      } else if (combinedDivisions) {
        showCombinedDivisions(combinedDivisions);
      } else {
        showDivision(currentDivision);
      }
      return true;
    }

    async function fetchResults(tournamentName = currentTournament, { allowCache = true, forceRefresh = false } = {}) {
      const requestedTournament = tournamentName || "";
      if (!requestedTournament) return false;

      if (allowCache && !forceRefresh) {
        const cached = readLiveResultsCache(requestedTournament);
        const hasCachedData = cached && cached.data;
        const isCacheFresh = hasCachedData && (Date.now() - cached.timestamp < LIVE_RESULTS_CACHE_TTL_MS);
        if (isCacheFresh) {
          return applyLiveResultsPayload(cached.data, requestedTournament);
        }
      }

      const res = await fetch(`${apiUrl}?action=getResults&tournament=${encodeURIComponent(requestedTournament)}`, { cache: 'no-store' });
      const parsed = await res.json();
      writeLiveResultsCache(requestedTournament, parsed);
      return applyLiveResultsPayload(parsed, requestedTournament);
    }

    function buildFinalsBracket(div) {
      const schedule = liveResults.schedule || {};
      const matches = [];
      for (const date in schedule) {
        (schedule[date] || []).forEach(m => { if (m.division === div) matches.push(m); });
      }

      const calcSetWins = (match) => {
        const a = (match.scores && match.scores.a) || [];
        const b = (match.scores && match.scores.b) || [];
        const len = Math.max(a.length, b.length);
        let swA = 0, swB = 0;
        for (let i = 0; i < len; i++) {
          const sa = a[i];
          const sb = b[i];
          const winnerDelta = getSetWinnerDelta(sa, sb, match.division);
          if (winnerDelta === 1) swA++;
          else if (winnerDelta === -1) swB++;
        }
        return { swA, swB };
      };

      const winner = (match) => {
        if (!match) return null;
        const { swA, swB } = calcSetWins(match);
        if (swA > swB) return match.team;
        if (swB > swA) return match.opponent;
        return null;
      };

      const renderMatch = (match) => {
        if (!match) return '';
        const { swA, swB } = calcSetWins(match);
        const aScores = (match.scores && match.scores.a) || [];
        const bScores = (match.scores && match.scores.b) || [];
        const keyA = normalizeName(match.team);
        const keyB = normalizeName(match.opponent);
        const colorA = getTeamColor(match.team);
        const colorB = getTeamColor(match.opponent);
        const lines = [];
        const len = Math.max(aScores.length, bScores.length);
        for (let i = 0; i < len; i++) {
          const sa = aScores[i];
          const sb = bScores[i];
          if (sa === undefined || sb === undefined) continue;
          lines.push(`${sa}-${sb}`);
        }
        const scoreHtml = lines.map(s => `<div>${s}</div>`).join('');
        return `<div class="match"><div class="team-block"><span class="team-color team-entry" data-team="${keyA}" style="color:${colorA}">${match.team}</span><div class="score-lines">${scoreHtml}</div></div><div class="set-count">${swA}-${swB}</div><div class="team-block"><span class="team-color team-entry" data-team="${keyB}" style="color:${colorB}">${match.opponent}</span><div class="score-lines">${scoreHtml}</div></div></div>`;
      };

      const semi1 = matches[0];
      const semi2 = matches[1];
      const finalMatch = matches[matches.length - 1];

      const w1 = winner(semi1);
      const w2 = winner(semi2);
      const finalTeamA = finalMatch ? (w1 || finalMatch.team) : w1;
      const finalTeamB = finalMatch ? (w2 || finalMatch.opponent) : w2;
      const finalObj = finalMatch ? { ...finalMatch, team: finalTeamA, opponent: finalTeamB } : null;
      const champ = finalObj ? winner(finalObj) : null;

      const htmlParts = ['<div class="bracket horizontal">'];
      htmlParts.push('<div class="round semifinals">');
      htmlParts.push(renderMatch(semi1));
      htmlParts.push(renderMatch(semi2));
      htmlParts.push('</div>');
      htmlParts.push('<div class="line"></div>');
      htmlParts.push('<div class="round final">');
      htmlParts.push(renderMatch(finalObj));
      htmlParts.push('</div>');
      htmlParts.push('<div class="line"></div>');
      if (champ) htmlParts.push(`<div class="champion">${champ}</div>`);
      htmlParts.push('</div>');
      return htmlParts.join('');
    }

  function showDivision(div) {
      const changed = currentDivision !== div;
      currentDivision = div;
      combinedDivisions = null;
      if (changed) highlightTeam(null);
      const data = (liveResults.divisions || {})[div];
      const container = document.getElementById('divisionContent');
      if (!data) { container.innerHTML = ''; return; }

      if (/finals/i.test(div)) {
        let html = '<div class="auto-renew-note">Table auto refresh every 15 sec</div>' +
          buildFinalsBracket(div);
        container.innerHTML = html;
        document.querySelectorAll('#divisionTabs button').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.querySelector(`#divisionTabs button[data-division="${div}"]`);
        if (activeBtn) activeBtn.classList.add('active');
        document.querySelectorAll('#divisionContent .team-entry').forEach(el => {
          el.addEventListener('click', () => highlightTeam(el.dataset.team));
        });
        if (highlightedTeamKey) highlightTeam(highlightedTeamKey);
        return;
      }

      const standingsForDivision = ((computeStandings(liveResults.schedule || {}, { excludeFinalsDates: true }) || {})[div] || {}).standings || [];

      const pickleballMode = usePickleballRules();
      let html = '<div class="auto-renew-note">Table auto refresh every 15 sec</div>' +
        '<table class="ranking-table"><thead><tr>' +
        (pickleballMode
          ? '<th>#</th><th>Team</th><th>W</th><th>L</th><th>D</th><th>PW</th><th>PL</th><th>PD</th>'
          : '<th>#</th><th>Team</th><th>W</th><th>L</th><th>D</th><th>SW</th><th>SL</th><th>Set%</th><th>PW</th><th>PL</th><th>Pts%</th>') +
        '</tr></thead><tbody>';
      standingsForDivision.forEach((row, i) => {
        const nameKey = normalizeName(row.team);
        const displayName = teamNameMap[nameKey] || row.team;
        const setPct = row.setsWon + row.setsLost > 0 ?
          (row.setsWon / (row.setsWon + row.setsLost) * 100).toFixed(1) : '0';
        const scorePct = row.pointsWon + row.pointsLost > 0 ?
          (row.pointsWon / (row.pointsWon + row.pointsLost) * 100).toFixed(1) : '0';
        const pointDiff = row.pointsWon - row.pointsLost;
        const color = getTeamColor(displayName);
        html += `<tr data-team="${nameKey}"><td>${row.rank}</td><td><span class="team-color team-entry" data-team="${nameKey}" style="color:${color}">${displayName}</span></td><td>${row.wins}</td><td>${row.losses}</td><td>${row.draws}</td>` +
          (pickleballMode
            ? `<td>${row.pointsWon}</td><td>${row.pointsLost}</td><td>${pointDiff}</td>`
            : `<td>${row.setsWon}</td><td>${row.setsLost}</td><td>${setPct}%</td><td>${row.pointsWon}</td><td>${row.pointsLost}</td><td>${scorePct}%</td>`) +
          '</tr>';
      });
      html += '</tbody></table>';
      html += '<div class="auto-renew-note">Click your team name for highlights viewing</div>';
      const schedule = liveResults.schedule || {};
      const hasFinalsDate = Object.keys(schedule).some(date => {
        const matches = (schedule[date] || []).filter(m => normalizeDivisionName(m.division) === div);
        return matches.length && isFinalsDateLabel(date);
      });
      if (!hasFinalsDate) {
        hideNonFinalsMatches = false;
        finalsVisibilityPreference = null;
      } else {
        hideNonFinalsMatches = finalsVisibilityPreference ?? true;
      }
      if (hasFinalsDate) {
        const toggleText = hideNonFinalsMatches ? 'Show non-Finals matches' : 'Hide non-Finals matches';
        html += `<div class="finals-toggle-wrap"><button id="finalsToggleBtn" class="finals-toggle-btn">${toggleText}</button></div>`;
      }

      html += '<div class="match-days">';
      for (const date in schedule) {
        if (hideNonFinalsMatches && !isFinalsDateLabel(date)) continue;
        const matches = (schedule[date] || []).filter(m => normalizeDivisionName(m.division) === div);
        if (!matches.length) continue;
        const isFinalsDate = isFinalsDateLabel(date);
        const dayClasses = `card match-day${isFinalsDate ? ' finals-day' : ''}`;
        html += `<div class="${dayClasses}"><div class="date-header">${date}</div>`;
        matches.forEach(match => {
          const aScores = (match.scores && match.scores.a) || [];
          const bScores = (match.scores && match.scores.b) || [];
          const len = Math.max(aScores.length, bScores.length);
          let swA = 0, swB = 0;
          for (let i = 0; i < len; i++) {
            const sa = aScores[i];
            const sb = bScores[i];
            const winnerDelta = getSetWinnerDelta(sa, sb, match.division);
            if (winnerDelta === 1) swA++;
            else if (winnerDelta === -1) swB++;
            // collect set rows later
          }
        const keyA = normalizeName(match.team);
        const keyB = normalizeName(match.opponent);
        const colorA = getTeamColor(match.team);
        const colorB = getTeamColor(match.opponent);
        const isFinalsMatch = isFinalsDate;
        const teamAIsWinner = isFinalsMatch && swA > swB;
        const teamBIsWinner = isFinalsMatch && swB > swA;
        const teamAClasses = `team-color team-entry${teamAIsWinner ? ' finals-winner' : ''}`;
        const teamBClasses = `team-color team-entry${teamBIsWinner ? ' finals-winner' : ''}`;
        const teamALabel = `${match.team}${teamAIsWinner ? '<span class="finals-medal" aria-label="winner medal">🏅</span>' : ''}`;
        const teamBLabel = `${match.opponent}${teamBIsWinner ? '<span class="finals-medal" aria-label="winner medal">🏅</span>' : ''}`;

        const setLabels = getSetLabels();
        const header = [];
        const scores = [];
        const minDisplaySets = usePickleballRules() ? 4 : 5;
        const maxSets = Math.max(aScores.length, bScores.length, minDisplaySets);
        for (let i = 0; i < maxSets; i++) {
          const sa = aScores[i];
          const sb = bScores[i];
          if (sa === undefined || sb === undefined) continue;

          `<table class="set-table"><tr>${header.join('')}</tr><tr>${scores.join('')}</tr></table>` +

    function showCombinedDivisions(divList) {
      combinedDivisions = divList.slice();
      highlightTeam(null);
      const schedule = {};
      for (const date in liveResults.schedule || {}) {
        const matches = (liveResults.schedule[date] || []).filter(m => {
          const divisionName = normalizeDivisionName(m && m.division);
          return divList.includes(divisionName);
        });
        if (matches.length) {
          schedule[date] = matches.map(m => {
            const divisionName = normalizeDivisionName(m && m.division);
            return { ...m, origDivision: divisionName, division: 'Combined' };
          });
        }
      }
      const standingsObj = computeStandings(schedule, { excludeFinalsDates: true });
      const data = standingsObj['Combined'];
      const container = document.getElementById('divisionContent');
      if (!data) { container.innerHTML = ''; return; }

      const pickleballMode = usePickleballRules();
      let html = '<div class="auto-renew-note">Table auto refresh every 15 sec</div>' +
        '<table class="ranking-table"><thead><tr>' +
        (pickleballMode
          ? '<th>#</th><th>Team</th><th>W</th><th>L</th><th>D</th><th>PW</th><th>PL</th><th>PD</th>'
          : '<th>#</th><th>Team</th><th>W</th><th>L</th><th>D</th><th>SW</th><th>SL</th><th>Set%</th><th>PW</th><th>PL</th><th>Pts%</th>') +
        '</tr></thead><tbody>';
      data.standings.forEach(row => {
        const nameKey = normalizeName(row.team);
        const displayName = teamNameMap[nameKey] || row.team;
        const setPct = row.setsWon + row.setsLost > 0 ?
          (row.setsWon / (row.setsWon + row.setsLost) * 100).toFixed(1) : '0';
        const scorePct = row.pointsWon + row.pointsLost > 0 ?
          (row.pointsWon / (row.pointsWon + row.pointsLost) * 100).toFixed(1) : '0';
        const pointDiff = row.pointsWon - row.pointsLost;
        const color = getTeamColor(displayName);
        html += `<tr data-team="${nameKey}"><td>${row.rank}</td><td><span class="team-color team-entry" data-team="${nameKey}" style="color:${color}">${displayName}</span></td><td>${row.wins}</td><td>${row.losses}</td><td>${row.draws}</td>` +
          (pickleballMode
            ? `<td>${row.pointsWon}</td><td>${row.pointsLost}</td><td>${pointDiff}</td>`
            : `<td>${row.setsWon}</td><td>${row.setsLost}</td><td>${setPct}%</td><td>${row.pointsWon}</td><td>${row.pointsLost}</td><td>${scorePct}%</td>`) +
          '</tr>';
      });
      html += '</tbody></table>';
      html += '<div class="auto-renew-note">Click your team name for highlights viewing</div>';
      const hasFinalsDate = Object.keys(schedule).some(date => isFinalsDateLabel(date));
      if (!hasFinalsDate) {
        hideNonFinalsMatches = false;
        finalsVisibilityPreference = null;
      } else {
        hideNonFinalsMatches = finalsVisibilityPreference ?? true;
      }
      if (hasFinalsDate) {
        const toggleText = hideNonFinalsMatches ? 'Show non-Finals matches' : 'Hide non-Finals matches';
        html += `<div class="finals-toggle-wrap"><button id="finalsToggleBtn" class="finals-toggle-btn">${toggleText}</button></div>`;
      }

      html += '<div class="match-days">';
      for (const date in schedule) {
        if (hideNonFinalsMatches && !isFinalsDateLabel(date)) continue;
        const matches = schedule[date];
        const isFinalsDate = isFinalsDateLabel(date);
        const dayClasses = `card match-day${isFinalsDate ? ' finals-day' : ''}`;
        html += `<div class="${dayClasses}"><div class="date-header">${date}</div>`;
        matches.forEach(match => {
          const aScores = (match.scores && match.scores.a) || [];
          const bScores = (match.scores && match.scores.b) || [];
          const len = Math.max(aScores.length, bScores.length);
          let swA = 0, swB = 0;
          for (let i = 0; i < len; i++) {
            const sa = aScores[i];
            const sb = bScores[i];
            const winnerDelta = getSetWinnerDelta(sa, sb, match.origDivision);
            if (winnerDelta === 1) swA++;
            else if (winnerDelta === -1) swB++;
          }
          const keyA = normalizeName(match.team);
          const keyB = normalizeName(match.opponent);
          const colorA = getTeamColor(match.team);
          const colorB = getTeamColor(match.opponent);
          const isFinalsMatch = isFinalsDate;
          const teamAIsWinner = isFinalsMatch && swA > swB;
          const teamBIsWinner = isFinalsMatch && swB > swA;
          const teamAIsLoser = isFinalsMatch && swA < swB;
          const teamBIsLoser = isFinalsMatch && swB < swA;
          const teamAClasses = `team-color team-entry${teamAIsWinner ? ' finals-winner' : ''}${teamAIsLoser ? ' finals-loser' : ''}`;
          const teamBClasses = `team-color team-entry${teamBIsWinner ? ' finals-winner' : ''}${teamBIsLoser ? ' finals-loser' : ''}`;
          const teamALabel = `${match.team}${teamAIsWinner ? '<span class="finals-medal" aria-label="winner medal">🏅</span>' : ''}`;
          const teamBLabel = `${match.opponent}${teamBIsWinner ? '<span class="finals-medal" aria-label="winner medal">🏅</span>' : ''}`;
          const setLabels = getSetLabels();
          const header = [];
          const scores = [];
          const minDisplaySets = usePickleballRules() ? 4 : 5;
          const maxSets = Math.max(aScores.length, bScores.length, minDisplaySets);
          for (let i = 0; i < maxSets; i++) {
            const sa = aScores[i];
            const sb = bScores[i];
            if (sa === undefined || sb === undefined) continue;
            header.push(`<th class="set-num">${setLabels[i] || `${i + 1}th Set`}</th>`);
            scores.push(`<td class="set-score">${sa}-${sb}</td>`);
          }

          const divisionLabel =
            usePickleballRules() && match.origDivision === 'Main Division'
              ? ''
              : ` <span class="division">${match.origDivision}</span>`;

          html += `<div class="match-result">` +
            `<div class="match-header"><span class="${teamAClasses}" data-team="${keyA}" style="color:${colorA}">${teamALabel}</span>` +
            ` <span class="set-count">${swA}-${swB}</span> ` +
            `<span class="${teamBClasses}" data-team="${keyB}" style="color:${colorB}">${teamBLabel}</span>` +
            `${divisionLabel}</div>` +
            `<table class="set-table"><tr>${header.join('')}</tr><tr>${scores.join('')}</tr></table>` +
            `</div>`;
        });
        html += '</div>';
      }
      html += '</div>';

      container.innerHTML = html;

      document.querySelectorAll('#divisionTabs button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('#divisionContent .team-entry').forEach(el => {
        el.addEventListener('click', () => highlightTeam(el.dataset.team));
      });
      const finalsToggleBtn = document.getElementById('finalsToggleBtn');
      if (finalsToggleBtn) {
        finalsToggleBtn.addEventListener('click', () => {
          hideNonFinalsMatches = !hideNonFinalsMatches;
          finalsVisibilityPreference = hideNonFinalsMatches;
          showCombinedDivisions(divList);
        });
      }
    }

          teams.add(match.team);

          el.innerHTML += `<option value="${item}">${item}</option>`;

    function filterResults() {

      const court = document.getElementById("courtFilter").value;
      const date = document.getElementById("dateFilter").value;
      const results = document.getElementById("results");

      const dateList = date ? [date] : Object.keys(scheduleData);

      dateList.forEach(d => {
        if (!scheduleData[d]) return;

        scheduleData[d].forEach((match, idx) => {
          if (!match) return;
          const index = match.sheetRow ?? match.rowIndex ?? idx;
          const matchTeam = match.team,
                matchOpponent = match.opponent,
                duty = match.dutyTeam;
          if (team) {
            const t = normalizeName(team);
            const dutyText = normalizeName(duty || "");
            if (t !== normalizeName(matchTeam) &&
                t !== normalizeName(matchOpponent) &&
                !dutyText.includes(t)) return;
          }
          if (division && match.division !== division) return;
          if (court && match.location !== court) return;

          const card = document.createElement("div");
          card.className = "card";
          const teamHTML = `<span class="team-color" data-team="${normalizeName(match.team)}">${match.team}</span> vs <span class="team-color" data-team="${normalizeName(match.opponent)}">${match.opponent}</span>`;
          const pickleballMode = usePickleballRules();
          card.innerHTML = `
            <div class="team">${teamHTML}</div>
            ${pickleballMode ? '' : `<div class="division" style="color:${getDivisionColor(match.division)}">${match.division}</div>`}
            <div class="match-date">📅 Date: ${d}</div>
            <div class="time">⏰ Time: ${match.time}</div>
            <div class="location">🏟️ Court: ${match.location}</div>

          if (match.allowResult) {
            const btn = document.createElement("button");
            btn.textContent = "Enter Result (Referee use only)";
            btn.onclick = () => promptPasscode(d, index, match.team, match.opponent);
            card.appendChild(btn);
          }
          results.appendChild(card);
        });
      });

      });
